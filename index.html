<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>충남 사운드 픽 — 노을 투표</title>
<style>
  :root{
    --sea-deep:#0E1B2E;
    --sea-mid:#16273f;
    --sea-line:#24395c;
    --sun:#FF7A48;
    --sun-soft:#FFC49B;
    --haze:#8FA7C7;
    --sand:#F2EDE6;
    --card:#152438;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--sea-deep);
    color:var(--sand);
    font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Malgun Gothic",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 20px 80px;}

  .sky{
    position:relative;height:210px;overflow:hidden;
    background:linear-gradient(180deg,#0E1B2E 0%,#1d2c47 55%,#3a3a5c 78%,#6b4a58 100%);
    border-bottom:1px solid var(--sun);
  }
  .sun{
    position:absolute;left:50%;transform:translateX(-50%);
    width:74px;height:74px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%, #ffd9b0 0%, var(--sun) 55%, #e05a2b 100%);
    box-shadow:0 0 60px 18px rgba(255,122,72,.35);
    transition:top 1.2s cubic-bezier(.4,0,.2,1);
    top:18px;
  }
  .sea-glint{
    position:absolute;bottom:0;left:0;right:0;height:14px;
    background:linear-gradient(90deg,transparent,rgba(255,122,72,.45),transparent);
    filter:blur(4px);
  }
  .sky-label{
    position:absolute;top:20px;left:20px;
    font-size:11px;letter-spacing:.28em;color:var(--haze);
  }
  .sky-count{
    position:absolute;top:20px;right:20px;text-align:right;
    font-size:11px;letter-spacing:.18em;color:var(--sun-soft);
  }
  .sky-count b{display:block;font-size:26px;letter-spacing:0;font-weight:800;color:var(--sand);}

  h1{font-size:26px;font-weight:800;line-height:1.3;margin:28px 0 6px;}
  h1 em{font-style:normal;color:var(--sun);}
  .sub{color:var(--haze);font-size:14px;line-height:1.6;margin-bottom:24px;}

  .gate{margin-top:8px;}
  .gate input{
    width:100%;padding:15px 16px;border-radius:12px;border:1px solid var(--sea-line);
    background:var(--card);color:var(--sand);font-size:16px;outline:none;
  }
  .gate input:focus{border-color:var(--sun);}
  .btn{
    display:block;width:100%;margin-top:12px;padding:15px;border:none;border-radius:12px;
    background:var(--sun);color:#1a0e07;font-size:16px;font-weight:800;cursor:pointer;
  }
  .btn.ghost{background:transparent;border:1px solid var(--sea-line);color:var(--haze);font-weight:700;}
  .btn:disabled{background:var(--sea-line);color:var(--haze);cursor:default;}
  .btn:focus-visible,.gate input:focus-visible,.pick:focus-visible,.play:focus-visible{outline:2px solid var(--sun-soft);outline-offset:2px;}

  .tracks{display:flex;flex-direction:column;gap:12px;margin-top:20px;}
  .card{
    background:var(--card);border:1px solid var(--sea-line);border-radius:14px;
    padding:16px;transition:border-color .2s;
  }
  .card.sel{border-color:var(--sun);box-shadow:0 0 0 1px var(--sun);}
  .card-top{display:flex;align-items:center;gap:12px;}
  .play{
    flex:none;width:44px;height:44px;border-radius:50%;border:1px solid var(--sea-line);
    background:var(--sea-mid);color:var(--sand);cursor:pointer;font-size:15px;
    display:flex;align-items:center;justify-content:center;
  }
  .play.on{background:var(--sun);border-color:var(--sun);color:#1a0e07;}
  .tmeta{flex:1;min-width:0;}
  .tname{font-size:15px;font-weight:700;line-height:1.35;}
  .tdur{font-size:12px;color:var(--haze);margin-top:2px;}
  .pick{
    flex:none;padding:9px 14px;border-radius:999px;border:1px solid var(--sea-line);
    background:transparent;color:var(--haze);font-size:13px;font-weight:700;cursor:pointer;
  }
  .card.sel .pick{background:var(--sun);border-color:var(--sun);color:#1a0e07;}
  .prog{
    margin-top:12px;height:5px;border-radius:99px;background:var(--sea-line);
    overflow:hidden;cursor:pointer;display:none;
  }
  .card.playing .prog{display:block;}
  .prog>div{height:100%;width:0;background:linear-gradient(90deg,var(--sun-soft),var(--sun));}

  .submit-bar{
    position:sticky;bottom:0;padding:16px 0 24px;
    background:linear-gradient(180deg,transparent,var(--sea-deep) 35%);
  }
  .hint{text-align:center;font-size:12px;color:var(--haze);margin-top:8px;}

  .res{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
  .rrow{background:var(--card);border:1px solid var(--sea-line);border-radius:14px;padding:14px 16px;}
  .rrow.win{border-color:var(--sun);}
  .rhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
  .rname{font-size:14px;font-weight:700;}
  .rcnt{font-size:13px;color:var(--sun-soft);font-weight:800;flex:none;}
  .rbar{margin-top:9px;height:7px;border-radius:99px;background:var(--sea-line);overflow:hidden;}
  .rbar>div{height:100%;background:linear-gradient(90deg,var(--sun-soft),var(--sun));transition:width .8s;}
  .voters{margin-top:22px;font-size:12px;color:var(--haze);line-height:1.8;}
  .reset{margin-top:30px;text-align:center;}
  .reset button{background:none;border:none;color:var(--sea-line);font-size:11px;cursor:pointer;text-decoration:underline;}
  .toast{
    position:fixed;left:50%;bottom:28px;transform:translateX(-50%);
    background:var(--sand);color:var(--sea-deep);font-size:13px;font-weight:700;
    padding:11px 18px;border-radius:99px;opacity:0;pointer-events:none;transition:opacity .3s;
    max-width:88vw;text-align:center;z-index:9;
  }
  .toast.show{opacity:1;}
  .hidden{display:none;}
  .share{
    margin-top:14px;display:flex;gap:8px;
  }
  .share input{
    flex:1;min-width:0;padding:12px 14px;border-radius:10px;border:1px solid var(--sea-line);
    background:var(--sea-mid);color:var(--haze);font-size:12px;
  }
  .share button{
    flex:none;padding:12px 16px;border-radius:10px;border:none;background:var(--sun);
    color:#1a0e07;font-size:13px;font-weight:800;cursor:pointer;
  }
  @media (prefers-reduced-motion: reduce){
    .sun,.rbar>div{transition:none;}
  }
</style>
</head>
<body>

<div class="sky">
  <div class="sky-label">CHUNGNAM&nbsp;SOUND&nbsp;VOTE</div>
  <div class="sky-count"><span>투표</span><b id="voteCount">0/5</b></div>
  <div class="sun" id="sun"></div>
  <div class="sea-glint"></div>
</div>

<div class="wrap">

  <!-- 이름 입력 -->
  <section id="viewGate">
    <h1>해가 지기 전에,<br><em>충남의 소리</em> 2곡을 골라주세요</h1>
    <p class="sub">6곡을 듣고 마음에 드는 2곡을 픽하면 끝. 5명이 모두 투표하면 해가 수평선에 닿고 결과가 공개됩니다.</p>
    <div class="gate">
      <input id="nameInput" type="text" maxlength="12" placeholder="이름 또는 닉네임" autocomplete="off">
      <button class="btn" id="startBtn" disabled>듣고 픽하러 가기</button>
    </div>
  </section>

  <!-- 투표 -->
  <section id="viewVote" class="hidden">
    <h1><em id="voterName"></em>님,<br>2곡을 픽해주세요</h1>
    <p class="sub">재생 버튼으로 들어보고, 픽 버튼으로 선택 · 해제할 수 있어요.</p>
    <div class="tracks" id="trackList"></div>
    <div class="submit-bar">
      <button class="btn" id="submitBtn" disabled>0/2 픽 완료</button>
      <p class="hint">제출하면 수정할 수 없어요</p>
    </div>
  </section>

  <!-- 결과 -->
  <section id="viewResult" class="hidden">
    <h1 id="resultTitle">지금까지의 <em>픽 현황</em></h1>
    <p class="sub" id="resultSub"></p>
    <div class="res" id="resList"></div>
    <div class="voters" id="voterList"></div>
    <div class="reset"><button id="resetBtn">전체 초기화</button></div>
  </section>

</div>

<div class="toast" id="toast"></div>

<script>
const TRACKS = [
  {id:"t1", name:"서해 노을 드라이브", src:"audio/track1.mp3", dur:178},
  {id:"t2", name:"다시, 충남", src:"audio/track2.mp3", dur:136},
  {id:"t3", name:"Chungnam Pulse", src:"audio/track3.mp3", dur:60},
  {id:"t4", name:"바다를 넘어", src:"audio/track4.mp3", dur:30},
  {id:"t5", name:"충남의 밤, 바다를 넘어", src:"audio/track5.mp3", dur:30},
  {id:"t6", name:"서해의 밤, 충남의 아침", src:"audio/track6.mp3", dur:30},
];

const MAX_VOTERS = 5;
const PICKS = 2;
const STORE = "https://api.restful-api.dev/objects/ff8081819d82fab6019f4ba2be0d4269";

let myName = "";
let picks = [];
let state = { votes: [] };
let pollTimer = null;

const $ = id => document.getElementById(id);
const toast = msg => {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove("show"), 2600);
};

/* ── shared storage (고정 투표함) ── */
async function loadState(){
  const r = await fetch(STORE + "?t=" + Date.now(), {cache:"no-store"});
  if(!r.ok) throw new Error("load " + r.status);
  const obj = await r.json();
  state = (obj && obj.data && Array.isArray(obj.data.votes)) ? obj.data : { votes: [] };
  return state;
}
async function saveState(){
  const r = await fetch(STORE, {
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ name:"chungnam-vote", data: state })
  });
  if(!r.ok) throw new Error("save " + r.status);
}

/* ── sun ── */
function setSun(n){
  const top = 18 + (n / MAX_VOTERS) * 120;
  $("sun").style.top = top + "px";
  $("voteCount").textContent = n + "/" + MAX_VOTERS;
}

/* ── tracks ── */
const fmt = s => Math.floor(s/60) + ":" + String(Math.round(s%60)).padStart(2,"0");
let currentAudio = null, currentCard = null;

function buildTracks(){
  const list = $("trackList");
  TRACKS.forEach(tr => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      '<div class="card-top">' +
        '<button class="play" aria-label="재생">&#9654;</button>' +
        '<div class="tmeta"><div class="tname"></div><div class="tdur"></div></div>' +
        '<button class="pick">픽</button>' +
      '</div>' +
      '<div class="prog"><div></div></div>';
    card.querySelector(".tname").textContent = tr.name;
    card.querySelector(".tdur").textContent = fmt(tr.dur);
    const playBtn = card.querySelector(".play");
    const pickBtn = card.querySelector(".pick");
    const prog = card.querySelector(".prog");
    const bar = prog.firstElementChild;

    const audio = new Audio(tr.src);
    audio.preload = "none";
    audio.addEventListener("timeupdate", () => {
      if(audio.duration) bar.style.width = (audio.currentTime / audio.duration * 100) + "%";
    });
    audio.addEventListener("ended", () => {
      playBtn.innerHTML = "&#9654;"; playBtn.classList.remove("on");
      card.classList.remove("playing");
      if(currentAudio === audio){ currentAudio = null; currentCard = null; }
    });

    playBtn.onclick = () => {
      if(currentAudio && currentAudio !== audio){
        currentAudio.pause();
        currentCard.querySelector(".play").innerHTML = "&#9654;";
        currentCard.querySelector(".play").classList.remove("on");
        currentCard.classList.remove("playing");
      }
      if(audio.paused){
        audio.play();
        playBtn.innerHTML = "&#10074;&#10074;"; playBtn.classList.add("on");
        card.classList.add("playing");
        currentAudio = audio; currentCard = card;
      }else{
        audio.pause();
        playBtn.innerHTML = "&#9654;"; playBtn.classList.remove("on");
      }
    };
    prog.onclick = e => {
      const r = prog.getBoundingClientRect();
      if(audio.duration) audio.currentTime = (e.clientX - r.left) / r.width * audio.duration;
    };
    pickBtn.onclick = () => {
      const i = picks.indexOf(tr.id);
      if(i >= 0){ picks.splice(i,1); card.classList.remove("sel"); }
      else{
        if(picks.length >= PICKS){ toast("2곡까지만 픽할 수 있어요 — 하나를 해제해주세요"); return; }
        picks.push(tr.id); card.classList.add("sel");
      }
      const btn = $("submitBtn");
      btn.textContent = picks.length + "/2 픽 완료" + (picks.length === PICKS ? " — 제출하기" : "");
      btn.disabled = picks.length !== PICKS;
    };
    list.appendChild(card);
  });
}

/* ── views ── */
function show(view){
  ["viewGate","viewVote","viewResult"].forEach(v => $(v).classList.toggle("hidden", v !== view));
}
function stopAudio(){
  if(currentAudio){ currentAudio.pause(); currentAudio = null; currentCard = null; }
}

function renderResults(){
  const n = state.votes.length;
  const done = n >= MAX_VOTERS;
  setSun(Math.min(n, MAX_VOTERS));
  $("resultTitle").innerHTML = done
    ? "해가 졌습니다 — <em>최종 결과</em>"
    : "지금까지의 <em>픽 현황</em>";
  $("resultSub").textContent = done
    ? "5명의 투표가 모두 끝났어요."
    : (MAX_VOTERS - n) + "명이 더 투표하면 결과가 확정돼요. 이 화면은 자동으로 갱신됩니다.";

  const counts = {};
  TRACKS.forEach(t => counts[t.id] = 0);
  state.votes.forEach(v => v.picks.forEach(p => { if(p in counts) counts[p]++; }));
  const max = Math.max(1, ...Object.values(counts));
  const sorted = [...TRACKS].sort((a,b) => counts[b.id] - counts[a.id]);

  $("resList").innerHTML = "";
  sorted.forEach(t => {
    const row = document.createElement("div");
    row.className = "rrow" + (done && counts[t.id] === max && max > 0 ? " win" : "");
    row.innerHTML =
      '<div class="rhead"><div class="rname"></div><div class="rcnt"></div></div>' +
      '<div class="rbar"><div></div></div>';
    row.querySelector(".rname").textContent = t.name;
    row.querySelector(".rcnt").textContent = counts[t.id] + "표";
    row.querySelector(".rbar>div").style.width = (counts[t.id] / max * 100) + "%";
    $("resList").appendChild(row);
  });

  $("voterList").textContent = n
    ? "투표 완료: " + state.votes.map(v => v.name).join(" · ")
    : "아직 아무도 투표하지 않았어요.";
}

function startPolling(){
  clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if(state.votes.length >= MAX_VOTERS){ clearInterval(pollTimer); return; }
    try{ await loadState(); renderResults(); }catch(e){}
  }, 5000);
}

/* ── flow ── */
$("nameInput").addEventListener("input", e => {
  $("startBtn").disabled = !e.target.value.trim();
});
$("nameInput").addEventListener("keydown", e => {
  if(e.key === "Enter" && !$("startBtn").disabled) $("startBtn").click();
});

$("startBtn").onclick = async () => {
  myName = $("nameInput").value.trim();
  const btn = $("startBtn");
  btn.disabled = true;
  try{
    await loadState();
  }catch(e){
    toast("불러오기 실패 — 새로고침 후 다시 시도해주세요");
    btn.disabled = false; return;
  }
  if(state.votes.length >= MAX_VOTERS){
    toast("투표가 이미 마감됐어요");
    show("viewResult"); renderResults(); return;
  }
  if(state.votes.some(v => v.name === myName)){
    toast("이미 투표한 이름이에요 — 결과를 보여드릴게요");
    show("viewResult"); renderResults(); startPolling(); return;
  }
  $("voterName").textContent = myName;
  show("viewVote");
};

$("submitBtn").onclick = async () => {
  const btn = $("submitBtn");
  btn.disabled = true; btn.textContent = "제출 중…";
  try{
    await loadState();
    if(state.votes.some(v => v.name === myName) || state.votes.length >= MAX_VOTERS){
      toast("이미 마감됐거나 중복 투표예요");
    }else{
      state.votes.push({ name: myName, picks: [...picks], ts: Date.now() });
      await saveState();
      toast("픽 완료! 노을이 한 뼘 내려왔어요");
    }
    stopAudio();
    show("viewResult"); renderResults(); startPolling();
  }catch(e){
    btn.disabled = false; btn.textContent = "2/2 픽 완료 — 제출하기";
    toast("제출 실패 — 다시 눌러주세요");
  }
};

$("resetBtn").onclick = async () => {
  if(!confirm("모든 투표 기록을 지우고 처음부터 시작할까요?")) return;
  state = { votes: [] };
  try{ await saveState(); }catch(e){}
  picks = [];
  document.querySelectorAll(".card").forEach(c => c.classList.remove("sel"));
  $("submitBtn").textContent = "0/2 픽 완료"; $("submitBtn").disabled = true;
  $("nameInput").value = ""; $("startBtn").disabled = true;
  setSun(0);
  show("viewGate");
};

/* ── init ── */
(async () => {
  buildTracks();
  try{
    await loadState();
    setSun(Math.min(state.votes.length, MAX_VOTERS));
    if(state.votes.length >= MAX_VOTERS){ show("viewResult"); renderResults(); }
  }catch(e){
    toast("기록을 불러오지 못했어요 — 새로고침 해보세요");
  }
})();
</script>
</body>
</html>
