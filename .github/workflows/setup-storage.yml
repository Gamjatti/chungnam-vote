name: setup-storage
on: workflow_dispatch
permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check plan object status
        run: |
          {
            echo "== plan object GET =="
            curl -s -w "\nHTTP:%{http_code}\n" "https://api.restful-api.dev/objects/ff8081819d82fab6019f54a78d6849ef"
            echo "== song object GET =="
            curl -s -w "\nHTTP:%{http_code}\n" "https://api.restful-api.dev/objects/ff8081819d82fab6019f4ba2be0d4269"
          } > check-result.txt 2>&1
          git config user.name "bot" && git config user.email "bot@local"
          git add check-result.txt && git commit -m "chore: storage check" && git push
