name: setup-storage
on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Create plan vote object
        run: |
          RES=$(curl -s -X POST "https://api.restful-api.dev/objects" \
            -H "Content-Type: application/json" \
            -d '{"name":"chungnam-plan","data":{"votes":[]}}')
          echo "$RES"
          echo "PLAN_ID=$(echo "$RES" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])')"
