name: setup-storage
on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Reset vote object to empty
        run: |
          curl -s -X PUT "https://api.restful-api.dev/objects/ff8081819d82fab6019f4ba2be0d4269" \
            -H "Content-Type: application/json" \
            -d '{"name":"chungnam-vote","data":{"votes":[]}}'
          echo ""
          echo "--- verify ---"
          curl -s "https://api.restful-api.dev/objects/ff8081819d82fab6019f4ba2be0d4269"
