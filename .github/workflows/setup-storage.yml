name: setup-storage
on: workflow_dispatch
permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create kvdb bucket, verify CORS, commit results
        run: |
          set -e
          BUCKET=$(curl -s -d 'email=chungnam.vote@gmail.com' https://kvdb.io | tr -d '[:space:]')
          curl -s -X POST "https://kvdb.io/${BUCKET}/votes" -d '{"votes":[]}' > /dev/null

          {
            echo "BUCKET_ID=${BUCKET}"
            echo "--- kvdb GET headers ---"
            curl -s -D - -o /dev/null -H "Origin: https://gamjatti.github.io" "https://kvdb.io/${BUCKET}/votes"
            echo "--- kvdb POST headers ---"
            curl -s -D - -o /dev/null -H "Origin: https://gamjatti.github.io" -X POST "https://kvdb.io/${BUCKET}/votes" -d '{"votes":[]}'
            echo "--- kvdb GET body ---"
            curl -s "https://kvdb.io/${BUCKET}/votes"
            echo ""
          } > cors-report.txt

          echo "const FIXED_ROOM = \"k_${BUCKET}\";" > room.js

          git config user.name "storage-bot"
          git config user.email "bot@local"
          git add cors-report.txt room.js
          git commit -m "chore: provision vote storage"
          git push
